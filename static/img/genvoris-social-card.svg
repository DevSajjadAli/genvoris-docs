<?xml version="1.0" encoding="UTF-8"?>
<!--
  Genvoris social card — 1200×630 (Open Graph / Twitter)
  Brand: navy gradient + gold wordmark/accent.
  Used as the site-wide og:image fallback for genvoris.org and
  docs.genvoris.org. Override per-page via Docusaurus frontmatter or
  Next.js `metadata.openGraph.images`.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F1A"/>
      <stop offset="100%" stop-color="#0F172B"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#F0B429" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0B0F1A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0B429"/>
      <stop offset="100%" stop-color="#FCD34D"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Top-left brand mark -->
  <g transform="translate(80,80)">
    <circle cx="20" cy="20" r="20" fill="url(#gold)"/>
    <text x="56" y="28"
          font-family="Inter, system-ui, sans-serif"
          font-size="24" font-weight="700"
          fill="#FFFFFF" letter-spacing="2">
      GENVORIS
    </text>
  </g>

  <!-- Headline -->
  <g transform="translate(80,260)">
    <text font-family="Inter, system-ui, sans-serif"
          font-size="72" font-weight="800"
          fill="#FFFFFF">
      <tspan x="0" dy="0">Virtual try-on</tspan>
      <tspan x="0" dy="84" fill="url(#gold)">infrastructure</tspan>
    </text>
  </g>

  <!-- Subhead -->
  <text x="80" y="500"
        font-family="Inter, system-ui, sans-serif"
        font-size="30" font-weight="400"
        fill="#94A3B8">
    Native Shopify and WordPress apps. REST API for everything else.
  </text>

  <!-- Footer URL -->
  <text x="80" y="570"
        font-family="JetBrains Mono, ui-monospace, monospace"
        font-size="22" font-weight="500"
        fill="#F0B429">
    docs.genvoris.org
  </text>

  <!-- Bottom-right gold accent bar -->
  <rect x="1100" y="0" width="6" height="630" fill="url(#gold)"/>
</svg>
